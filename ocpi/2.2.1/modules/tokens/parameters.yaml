openapi: 3.1.0
components:
  parameters:
    TokenUidParameter:
      in: path
      name: token_uid
      description: Token.uid of the Token object.
      required: true
      schema:
        type: string
        maxLength: 36
    TokenTypeQueryParameter:
      in: query
      name: type
      description: Token.type of the Token. Default if omitted is RFID.
      required: false
      schema:
        $ref: "./schema.yaml#/components/schemas/TokenType"
