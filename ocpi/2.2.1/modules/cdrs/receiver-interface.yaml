openapi: 3.1.0
info:
  title: OCPI 2.2.1 - CDRs Module - Receiver Interface
  description: |
    The Receiver Interface (typically implemented by the eMSP) allows creation and retrieval of CDRs.
    CDRs cannot be updated, replaced, or deleted. Instead, Credit CDRs can be sent to correct a CDR.
  version: 2.2.1
  contact:
    name: EVRoaming Foundation
    url: https://evroaming.org
externalDocs:
  description: OCPI 2.2.1 Specification
  url: https://github.com/ocpi/ocpi/blob/master/mod_cdrs.asciidoc
security:
  - OCPIToken: []

paths:
  /cdrs:
    post:
      operationId: receiverPostCdr
      summary: Create a new CDR
      tags: [ CDRs ]
      description: |
        Creates a new CDR. The POST method should contain the full and final CDR object.
        CDRs cannot be changed or replaced once sent. Instead, a Credit CDR can be sent.
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-party-id"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-party-id"
      requestBody:
        description: The new CDR object.
        required: true
        content:
          application/json:
            schema:
              $ref: "./schema.yaml#/components/schemas/CDR"
      responses:
        "201":
          description: CDR successfully created. The Location header contains the URL to the newly created CDR.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
            Location:
              description: URL to the newly created CDR in the eMSP's system, can be used by the CPO system to perform a GET on the same CDR.
              required: true
              schema:
                type: string
                format: uri
          content:
            application/json:
              schema:
                $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "409":
          description: CDR already exists.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"

  /cdrs/{cdr_id}:
    get:
      operationId: receiverGetCdr
      summary: Retrieve an existing CDR
      tags: [ CDRs ]
      description: |
        Fetch a CDR from the receiver's system. The actual URL structure is open to the eMSP
        to define. The URL is provided to the CPO by the eMSP in the Location header of the
        POST response. Therefore, OCPI does not strictly define variables for this endpoint.
        The path shown here is a typical implementation pattern.
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-party-id"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-party-id"
        - in: path
          name: cdr_id
          description: ID of the CDR to retrieve. The actual URL is provided by the eMSP in the POST response Location header.
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response containing the requested CDR.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "./schema.yaml#/components/schemas/CDR"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "404":
          $ref: "../../components/schema.yaml#/components/responses/OCPINotFoundResponse"
