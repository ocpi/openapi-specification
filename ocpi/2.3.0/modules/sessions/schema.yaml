openapi: 3.1.0
components:
  schemas:
    Session:
      type: object
      description: |
        The Session object describes one charging session. That doesn't mean it is required that energy
        has been transferred between EV and the Charge Point. It is possible that the EV never took
        energy from the Charge Point because it was instructed not to take energy by the driver.
        But as the EV was connected to the Charge Point, some form of start tariff, park tariff or
        reservation cost might be relevant.
      properties:
        country_code:
          type: string
          maxLength: 2
          description: ISO-3166 alpha-2 country code of the CPO that 'owns' this Session.
        party_id:
          type: string
          maxLength: 3
          description: ID of the CPO that 'owns' this Session (following the ISO-15118 standard).
        id:
          type: string
          maxLength: 36
          description: The unique id that identifies the charging session in the CPO platform.
        start_date_time:
          type: string
          format: date-time
          description: |
            The timestamp when the session became ACTIVE in the Charge Point.
            When the session is still PENDING, this field SHALL be set to the time the Session was
            created at the Charge Point. When a Session goes from PENDING to ACTIVE, this field SHALL
            be updated to the moment the Session went to ACTIVE in the Charge Point.
        end_date_time:
          type: string
          format: date-time
          description: The timestamp when the session was completed/finished, charging might have finished before the session ends, for example EV is full, but parking cost also has to be paid.
        kwh:
          type: number
          description: How many kWh were charged.
        cdr_token:
          $ref: "../cdrs/schema.yaml#/components/schemas/CdrToken"
          description: Token used to start this charging session, including all the relevant information to identify the unique token.
        auth_method:
          $ref: "../cdrs/schema.yaml#/components/schemas/AuthMethod"
          description: Method used for authentication. This might change during a session, for example when the session was started with a reservation (COMMAND). When the driver arrives and starts charging using a Token that is whitelisted (WHITELIST).
        authorization_reference:
          type: string
          maxLength: 36
          description: |
            Reference to the authorization given by the eMSP. When the eMSP provided an
            authorization_reference in either real-time authorization, StartSession or ReserveNow,
            this field SHALL contain the same value. When different authorization_reference values
            have been given by the eMSP that are relevant to this Session, the last given value
            SHALL be used here.
        location_id:
          type: string
          maxLength: 36
          description: Location.id of the Location object of this CPO, on which the charging session is/was happening.
        evse_uid:
          type: string
          maxLength: 36
          description: EVSE.uid of the EVSE of this Location on which the charging session is/was happening. Allowed to be set to '#NA' when this session is created for a reservation, but no EVSE yet assigned to the driver.
        connector_id:
          type: string
          maxLength: 36
          description: Connector.id of the Connector of this Location where the charging session is/was happening. Allowed to be set to '#NA' when this session is created for a reservation, but no connector yet assigned to the driver.
        meter_id:
          type: string
          maxLength: 255
          description: Optional identification of the kWh meter.
        currency:
          type: string
          maxLength: 3
          description: ISO 4217 code of the currency used for this session.
        charging_periods:
          type: array
          description: An optional list of Charging Periods that can be used to calculate and verify the total cost.
          items:
            $ref: "../cdrs/schema.yaml#/components/schemas/ChargingPeriod"
        total_cost:
          $ref: "../../components/schema.yaml#/components/schemas/Price"
          description: |
            The total cost of the session in the specified currency. This is the price that the eMSP
            will have to pay to the CPO. A total_cost of 0.00 means free of charge. When omitted,
            i.e. no price information is given in the Session object, it does not imply the session
            is/was free of charge.
        status:
          $ref: "#/components/schemas/SessionStatus"
          description: The status of the session.
        last_updated:
          type: string
          format: date-time
          description: Timestamp when this Session was last updated (or created).
      required:
        - country_code
        - party_id
        - id
        - start_date_time
        - kwh
        - cdr_token
        - auth_method
        - location_id
        - evse_uid
        - connector_id
        - currency
        - status
        - last_updated

    SessionPatch:
      type: object
      description: |
        Partial Session object for PATCH requests. Only fields present will be updated.
        The last_updated field is required.

        When a PATCH request contains the charging_periods field, this SHALL be processed as a request
        to add all the ChargingPeriod objects to the existing Session object. If the request
        charging_periods list is omitted (or contains an empty list), no changes SHALL be made to
        the existing list of charging_periods.
      properties:
        start_date_time:
          type: string
          format: date-time
        end_date_time:
          type: string
          format: date-time
        kwh:
          type: number
        cdr_token:
          $ref: "../cdrs/schema.yaml#/components/schemas/CdrToken"
        auth_method:
          $ref: "../cdrs/schema.yaml#/components/schemas/AuthMethod"
        authorization_reference:
          type: string
          maxLength: 36
        location_id:
          type: string
          maxLength: 36
        evse_uid:
          type: string
          maxLength: 36
        connector_id:
          type: string
          maxLength: 36
        meter_id:
          type: string
          maxLength: 255
        currency:
          type: string
          maxLength: 3
        charging_periods:
          type: array
          description: When present in a PATCH, these ChargingPeriod objects are added to the existing list.
          items:
            $ref: "../cdrs/schema.yaml#/components/schemas/ChargingPeriod"
        total_cost:
          $ref: "../../components/schema.yaml#/components/schemas/Price"
        status:
          $ref: "#/components/schemas/SessionStatus"
        last_updated:
          type: string
          format: date-time
      required:
        - last_updated

    ChargingPreferences:
      type: object
      description: Contains the charging preferences of an EV driver.
      properties:
        profile_type:
          $ref: "#/components/schemas/ProfileType"
          description: |
            Type of Smart Charging Profile selected by the driver. The ProfileType has to be supported
            at the Connector and for every supported ProfileType, a Tariff MUST be provided. This gives
            the EV driver the option between different pricing options.
        departure_time:
          type: string
          format: date-time
          description: Expected departure. The driver has given this Date/Time as expected departure moment. It is only an estimation and not necessarily the Date/Time of the actual departure.
        energy_need:
          type: number
          description: Requested amount of energy in kWh. The EV driver wants to have this amount of energy charged.
        discharge_allowed:
          type: boolean
          description: |
            The driver allows their EV to be discharged when needed, as long as the other preferences
            are met: EV is charged with the preferred energy (energy_need) until the preferred departure
            moment (departure_time). Default if omitted: false.
      required:
        - profile_type

    # ---- Enums ----

    SessionStatus:
      type: string
      format: enum
      description: Defines the state of a session.
      enum:
        - ACTIVE
        - COMPLETED
        - INVALID
        - PENDING
        - RESERVATION
      x-enumDescriptions:
        ACTIVE: The session has been accepted and is active. All pre-conditions were met. Energy is, or is not, being transferred.
        COMPLETED: The session has been finished successfully. No more modifications will be made to the Session object using this state.
        INVALID: The Session object using this state is declared invalid and will not be billed.
        PENDING: The session is pending, it has not yet started. Not all pre-conditions are met. This is the initial state.
        RESERVATION: The session is started due to a reservation, charging has not yet started.

    ProfileType:
      type: string
      format: enum
      description: Different smart charging profile types.
      enum:
        - CHEAP
        - FAST
        - GREEN
        - REGULAR
      x-enumDescriptions:
        CHEAP: Driver wants to use the cheapest charging profile possible.
        FAST: Driver wants his EV charged as quickly as possible and is willing to pay a premium for this, if needed.
        GREEN: Driver wants his EV charged with as much regenerative (green) energy as possible.
        REGULAR: Driver does not have special preferences.

    ChargingPreferencesResponse:
      type: string
      format: enum
      description: An enum with possible responses to a PUT Charging Preferences request.
      enum:
        - ACCEPTED
        - DEPARTURE_REQUIRED
        - ENERGY_NEED_REQUIRED
        - NOT_POSSIBLE
        - PROFILE_TYPE_NOT_SUPPORTED
      x-enumDescriptions:
        ACCEPTED: Charging Preferences accepted, EVSE will try to accomplish them, although this is no guarantee that they will be fulfilled.
        DEPARTURE_REQUIRED: CPO requires departure_time to be able to perform Charging Preference based Smart Charging.
        ENERGY_NEED_REQUIRED: CPO requires energy_need to be able to perform Charging Preference based Smart Charging.
        NOT_POSSIBLE: Charging Preferences contain a demand that the EVSE knows it cannot fulfill.
        PROFILE_TYPE_NOT_SUPPORTED: profile_type contains a value that is not supported by the EVSE.
