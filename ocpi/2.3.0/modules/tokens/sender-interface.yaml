openapi: 3.1.0
info:
  title: OCPI 2.3.0 - Tokens Module - Sender Interface
  description: |
    The Sender Interface (typically implemented by the eMSP) enables the Receiver to request the
    current list of Tokens. Via the POST method it is possible to authorize a single token in
    real-time.
  version: 2.3.0
  contact:
    name: EVRoaming Foundation
    url: https://evroaming.org
externalDocs:
  description: OCPI 2.3.0 Specification
  url: https://github.com/ocpi/ocpi/blob/master/mod_tokens.asciidoc
security:
  - OCPIToken: []

paths:
  /tokens:
    get:
      operationId: senderGetTokens
      summary: Get list of Tokens
      tags: [ Tokens ]
      description: |
        Fetch information about Tokens known in the eMSP systems. If additional parameters
        date_from and/or date_to are provided, only Tokens with last_updated between the given
        date_from (including) and date_to (excluding) will be returned. This request is paginated.
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-party-id"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-party-id"
        - $ref: "../../components/parameters.yaml#/components/parameters/DateFromParameter"
        - $ref: "../../components/parameters.yaml#/components/parameters/DateToParameter"
        - $ref: "../../components/parameters.yaml#/components/parameters/OffsetParameter"
        - $ref: "../../components/parameters.yaml#/components/parameters/LimitParameter"
      responses:
        "200":
          description: Successful response containing a list of Tokens.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
            X-Total-Count:
              $ref: "../../components/schema.yaml#/components/headers/X-Total-Count"
            X-Limit:
              $ref: "../../components/schema.yaml#/components/headers/X-Limit"
            Link:
              $ref: "../../components/schema.yaml#/components/headers/Link"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "./schema.yaml#/components/schemas/Token"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"

  /tokens/{token_uid}/authorize:
    post:
      operationId: senderPostAuthorize
      summary: Real-time authorization request
      tags: [ Tokens ]
      description: |
        Do a 'real-time' authorization request to the eMSP system, validating if a Token might be
        used (at the optionally given Location).

        When the eMSP does not know the Token, the eMSP SHALL respond with an HTTP status code:
        404 (Not Found).

        When the eMSP receives a 'real-time' authorization request from a CPO that contains too
        little information (no LocationReferences provided) to determine if the Token might be
        used, the eMSP SHALL respond with the OCPI status: 2002.
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-from-party-id"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-country-code"
        - $ref: "../../components/parameters.yaml#/components/parameters/OCPI-to-party-id"
        - $ref: "./parameters.yaml#/components/parameters/TokenUidParameter"
        - $ref: "./parameters.yaml#/components/parameters/TokenTypeQueryParameter"
      requestBody:
        description: |
          Optional LocationReferences object. The eMSP SHALL then validate if the Token is allowed
          to be used at this Location, and if applicable: which of the Location's EVSEs. The object
          with valid Location and EVSEs will be returned in the response.
        required: false
        content:
          application/json:
            schema:
              $ref: "./schema.yaml#/components/schemas/LocationReferences"
      responses:
        "200":
          description: |
            Successful response containing authorization information. When the token is known by
            the Sender, the response SHALL contain an AuthorizationInfo object.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "./schema.yaml#/components/schemas/AuthorizationInfo"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "404":
          $ref: "../../components/schema.yaml#/components/responses/OCPINotFoundResponse"
