openapi: 3.1.0
info:
  title: OCPI 2.3.0 - Credentials Module
  description: |
    The Credentials module is used to exchange the credentials token that has to be used by
    parties for authorization of requests.

    Every OCPI request is required to contain a credentials token in the HTTP Authorization header.

    The Credentials module is different from all other OCPI modules. This module is symmetric,
    it has to be implemented by all OCPI implementations, and all implementations need to be
    able to call this module on any other platform, and have to be able to handle receiving
    the request from another party.

    Example endpoint: /ocpi/2.3.0/credentials
  version: 2.3.0
  contact:
    name: EVRoaming Foundation
    url: https://evroaming.org
externalDocs:
  description: OCPI 2.3.0 Specification
  url: https://github.com/ocpi/ocpi/blob/master/credentials.asciidoc
security:
  - OCPIToken: []

paths:
  /credentials:
    get:
      operationId: getCredentials
      summary: Get credentials
      description: |
        Retrieves the credentials object to access the server's platform.
        The request body is empty, the response contains the credentials object to access
        the server's platform. This credentials object also contains extra information about
        the server such as its business details.
      tags: [ Credentials ]
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
      responses:
        "200":
          description: Successful response containing the credentials object.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "./schema.yaml#/components/schemas/Credentials"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"

    post:
      operationId: postCredentials
      summary: Register (credentials exchange)
      description: |
        Provides the server with credentials to access the client's system.
        This credentials object also contains extra information about the client such as
        its business details.

        A POST initiates the registration process for this endpoint's version. The server
        must also fetch the client's endpoints for this version.

        If successful, the server must generate a new credentials token and respond with
        the client's new credentials to access the server's system.

        This method MUST return a HTTP status code 405: method not allowed if the client
        has already been registered before.
      tags: [ Credentials ]
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
      requestBody:
        description: Credentials object containing the client's credentials and business details.
        required: true
        content:
          application/json:
            schema:
              $ref: "./schema.yaml#/components/schemas/Credentials"
      responses:
        "200":
          description: Successful registration. Response contains the server's credentials for the client.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "./schema.yaml#/components/schemas/Credentials"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "405":
          description: Client has already been registered. Use PUT to update credentials.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"

    put:
      operationId: putCredentials
      summary: Update credentials
      description: |
        Provides the server with updated credentials to access the client's system.
        This credentials object also contains extra information about the client such as
        its business details.

        A PUT will switch to the version that contains this credentials endpoint if it's
        different from the current version. The server must fetch the client's endpoints
        again, even if the version has not changed.

        If successful, the server must generate a new credentials token for the client and
        respond with the client's updated credentials to access the server's system.

        This method MUST return a HTTP status code 405: method not allowed if the client
        has not been registered yet.
      tags: [ Credentials ]
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
      requestBody:
        description: Updated credentials object.
        required: true
        content:
          application/json:
            schema:
              $ref: "./schema.yaml#/components/schemas/Credentials"
      responses:
        "200":
          description: Successful update. Response contains the server's updated credentials for the client.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "./schema.yaml#/components/schemas/Credentials"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "405":
          description: Client has not been registered yet. Use POST to register first.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"

    delete:
      operationId: deleteCredentials
      summary: Unregister (invalidate credentials)
      description: |
        Informs the server that its credentials to access the client's system are now invalid
        and can no longer be used. Both parties must end any automated communication.
        This is the unregistration process.

        This method MUST return a HTTP status code 405: method not allowed if the client
        has not been registered before.
      tags: [ Credentials ]
      parameters:
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Request-ID"
        - $ref: "../../components/parameters.yaml#/components/parameters/X-Correlation-ID"
      responses:
        "200":
          $ref: "../../components/schema.yaml#/components/responses/OCPISuccessResponse"
        "400":
          $ref: "../../components/schema.yaml#/components/responses/OCPIErrorResponse"
        "401":
          $ref: "../../components/schema.yaml#/components/responses/OCPIUnauthorizedResponse"
        "405":
          description: Client has not been registered. Cannot unregister.
          headers:
            X-Request-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Request-ID"
            X-Correlation-ID:
              $ref: "../../components/schema.yaml#/components/headers/X-Correlation-ID"
          content:
            application/json:
              schema:
                $ref: "../../components/schema.yaml#/components/schemas/OCPIResponse"
